services:
  db2:
    image: icr.io/db2_community/db2:latest
    container_name: hercules-db2
    privileged: true
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: H3rcules!
      DBNAME: HERCDB
    ports:
      - "50000:50000"
    volumes:
      - db2data:/database
    healthcheck:
      test: ["CMD", "su", "-", "db2inst1", "-c", "db2 connect to HERCDB"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 180s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/amd64   # ibm_db requires amd64; runs via Rosetta on Apple Silicon
    container_name: hercules-backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
      - DB2_HOST=db2
      - DB2_PORT=50000
      - DB2_DATABASE=HERCDB
      - DB2_USER=db2inst1
      - DB2_PASSWORD=H3rcules!
    depends_on:
      db2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hercules-frontend
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: hercules-net

volumes:
  db2data:
